<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Kiosk - Biometric & QR Auth</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #667eea;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .camera-section {
            grid-column: 1 / -1;
        }

        #video {
            width: 100%;
            max-width: 640px;
            height: auto;
            border-radius: 8px;
            background: #000;
            display: block;
            margin: 15px auto;
        }

        #canvas {
            display: none;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .btn-success {
            background: #10b981;
        }

        .btn-success:hover {
            background: #059669;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: #f3f4f6;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .result.success {
            background: #d1fae5;
            border-color: #10b981;
        }

        .result.error {
            background: #fee2e2;
            border-color: #ef4444;
        }

        .result h3 {
            margin-bottom: 10px;
        }

        .user-info {
            background: #f9fafb;
            padding: 15px;
            border-radius: 6px;
            margin-top: 10px;
        }

        .user-info p {
            margin: 5px 0;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .qr-display {
            text-align: center;
            margin-top: 15px;
        }

        .qr-display img {
            max-width: 300px;
            border: 2px solid #667eea;
            border-radius: 8px;
            margin: 10px 0;
        }

        .camera-controls {
            text-align: center;
            margin: 15px 0;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.9em;
            font-weight: 500;
        }

        .status-not-boarded {
            background: #fef3c7;
            color: #92400e;
        }

        .status-boarded {
            background: #d1fae5;
            color: #065f46;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Smart Kiosk Authentication</h1>
            <p>Biometric Face Recognition & QR Code Verification System</p>
        </div>

        <div class="grid">
            <!-- Camera Section -->
            <div class="card camera-section">
                <h2>Camera Feed</h2>
                <video id="video" autoplay></video>
                <canvas id="canvas"></canvas>
                <div class="camera-controls">
                    <button class="btn btn-success" id="startCamera">Start Camera</button>
                    <button class="btn btn-danger" id="stopCamera" disabled>Stop Camera</button>
                </div>
            </div>

            <!-- Registration Panel -->
            <div class="card">
                <h2>Passenger Registration</h2>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="regName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Passenger ID</label>
                    <input type="text" id="regPassengerId" placeholder="ABC123">
                </div>
                <div class="form-group">
                    <label>Flight Number</label>
                    <input type="text" id="regFlight" placeholder="AA100">
                </div>
                <div class="form-group">
                    <label>Seat</label>
                    <input type="text" id="regSeat" placeholder="12A">
                </div>
                <div class="form-group">
                    <label>Boarding Group</label>
                    <input type="text" id="regGroup" placeholder="Group 2">
                </div>
                <button class="btn" id="registerBtn">Capture & Register</button>
                <div id="registerResult"></div>
            </div>

            <!-- Verification Panel -->
            <div class="card">
                <h2>Authentication</h2>
                <div class="tabs">
                    <button class="tab active" data-tab="faceTab">Face Recognition</button>
                    <button class="tab" data-tab="qrTab">QR Code</button>
                </div>

                <!-- Face Auth Tab -->
                <div class="tab-content active" id="faceTab">
                    <p style="margin-bottom: 15px; color: #666;">Capture your face from the camera feed to authenticate.</p>
                    <button class="btn" id="faceAuthBtn">Capture & Verify Face</button>
                    <div id="faceAuthResult"></div>
                </div>

                <!-- QR Auth Tab -->
                <div class="tab-content" id="qrTab">
                    <div class="form-group">
                        <label>QR Token</label>
                        <input type="text" id="qrToken" placeholder="Paste QR token here">
                    </div>
                    <button class="btn" id="qrAuthBtn">Verify QR Code</button>
                    <div id="qrAuthResult"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Camera Management
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const startCameraBtn = document.getElementById('startCamera');
        const stopCameraBtn = document.getElementById('stopCamera');
        let stream = null;

        startCameraBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 640, height: 480 }
                });
                video.srcObject = stream;
                startCameraBtn.disabled = true;
                stopCameraBtn.disabled = false;
            } catch (error) {
                alert('Error accessing camera: ' + error.message);
            }
        });

        stopCameraBtn.addEventListener('click', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                startCameraBtn.disabled = false;
                stopCameraBtn.disabled = true;
            }
        });

        // Tab Switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const targetId = tab.dataset.tab;

                // Update active tab
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Update active content
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                document.getElementById(targetId).classList.add('active');
            });
        });

        // Capture frame from video
        function captureFrame() {
            if (!stream) {
                alert('Please start the camera first');
                return null;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            return new Promise((resolve) => {
                canvas.toBlob(resolve, 'image/jpeg');
            });
        }

        // Display result helper
        function displayResult(elementId, data, isSuccess) {
            const element = document.getElementById(elementId);
            const resultClass = isSuccess ? 'success' : 'error';

            let html = `<div class="result ${resultClass}">`;
            html += `<h3>${data.message || data.detail || 'Unknown response'}</h3>`;

            if (data.user) {
                html += `<div class="user-info">`;
                html += `<p><strong>Name:</strong> ${data.user.name}</p>`;
                html += `<p><strong>Passenger ID:</strong> ${data.user.passenger_id}</p>`;
                html += `<p><strong>Flight:</strong> ${data.user.ticket_info.flight_number}</p>`;
                html += `<p><strong>Seat:</strong> ${data.user.ticket_info.seat}</p>`;
                html += `<p><strong>Group:</strong> ${data.user.ticket_info.group}</p>`;

                const boardedClass = data.user.status.boarded ? 'status-boarded' : 'status-not-boarded';
                const boardedText = data.user.status.boarded ? 'Boarded' : 'Not Boarded';
                html += `<p><strong>Status:</strong> <span class="status-badge ${boardedClass}">${boardedText}</span></p>`;
                html += `</div>`;
            }

            if (data.similarity_score !== undefined) {
                html += `<p><strong>Similarity Score:</strong> ${(data.similarity_score * 100).toFixed(1)}%</p>`;
            }

            html += `</div>`;
            element.innerHTML = html;
        }

        // Registration
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const btn = document.getElementById('registerBtn');
            const resultDiv = document.getElementById('registerResult');

            try {
                btn.disabled = true;
                btn.innerHTML = 'Capturing... <span class="loading"></span>';

                const blob = await captureFrame();
                if (!blob) return;

                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                formData.append('name', document.getElementById('regName').value);
                formData.append('passenger_id', document.getElementById('regPassengerId').value);
                formData.append('flight_number', document.getElementById('regFlight').value);
                formData.append('seat', document.getElementById('regSeat').value);
                formData.append('group', document.getElementById('regGroup').value);

                btn.innerHTML = 'Registering... <span class="loading"></span>';

                const response = await fetch('/api/register', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);

                    resultDiv.innerHTML = `
                        <div class="result success">
                            <h3>Registration Successful!</h3>
                            <div class="qr-display">
                                <p><strong>Your QR Code:</strong></p>
                                <img src="${url}" alt="QR Code">
                                <p><small>Download this QR code for authentication</small></p>
                            </div>
                        </div>
                    `;
                } else {
                    const error = await response.json();
                    displayResult('registerResult', error, false);
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error"><h3>Error: ${error.message}</h3></div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Capture & Register';
            }
        });

        // Face Authentication
        document.getElementById('faceAuthBtn').addEventListener('click', async () => {
            const btn = document.getElementById('faceAuthBtn');
            const resultDiv = document.getElementById('faceAuthResult');

            try {
                btn.disabled = true;
                btn.innerHTML = 'Capturing... <span class="loading"></span>';

                const blob = await captureFrame();
                if (!blob) return;

                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');

                btn.innerHTML = 'Verifying... <span class="loading"></span>';

                const response = await fetch('/api/auth/face', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                displayResult('faceAuthResult', data, data.status === 'success');

            } catch (error) {
                resultDiv.innerHTML = `<div class="result error"><h3>Error: ${error.message}</h3></div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Capture & Verify Face';
            }
        });

        // QR Authentication
        document.getElementById('qrAuthBtn').addEventListener('click', async () => {
            const btn = document.getElementById('qrAuthBtn');
            const resultDiv = document.getElementById('qrAuthResult');
            const token = document.getElementById('qrToken').value;

            if (!token) {
                alert('Please enter a QR token');
                return;
            }

            try {
                btn.disabled = true;
                btn.innerHTML = 'Verifying... <span class="loading"></span>';

                const response = await fetch('/api/auth/qr', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ qr_token: token })
                });

                const data = await response.json();
                displayResult('qrAuthResult', data, data.status === 'success');

            } catch (error) {
                resultDiv.innerHTML = `<div class="result error"><h3>Error: ${error.message}</h3></div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Verify QR Code';
            }
        });

        // Auto-start camera on page load
        window.addEventListener('load', () => {
            startCameraBtn.click();
        });
    </script>
</body>
</html>
