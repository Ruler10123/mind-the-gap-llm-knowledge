<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .video-section {
            text-align: center;
        }

        video {
            width: 100%;
            max-width: 640px;
            border-radius: 8px;
            background: #000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        canvas {
            display: none;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }

        .section h2 {
            margin-bottom: 15px;
            color: #667eea;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #495057;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            background: #adb5bd;
            cursor: not-allowed;
            transform: none;
        }

        .start-camera-btn {
            background: #28a745;
        }

        .start-camera-btn:hover {
            background: #218838;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            font-weight: 500;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .result {
            margin-top: 15px;
            padding: 20px;
            border-radius: 8px;
            background: white;
            border: 2px solid #dee2e6;
            min-height: 60px;
        }

        .result.recognized {
            border-color: #28a745;
            background: #d4edda;
        }

        .result.unknown {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .result-name {
            font-size: 1.5em;
            font-weight: 700;
            color: #155724;
        }

        .result-id {
            font-size: 1.1em;
            color: #155724;
            margin-top: 5px;
        }

        .result-distance {
            font-size: 0.9em;
            color: #6c757d;
            margin-top: 5px;
        }

        .result-unknown {
            font-size: 1.3em;
            font-weight: 600;
            color: #721c24;
            text-align: center;
        }

        @media (max-width: 768px) {
            .controls {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Face Recognition System</h1>

        <div class="card video-section">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <button id="startCamera" class="start-camera-btn">Start Camera</button>
        </div>

        <div class="controls">
            <!-- Registration Section -->
            <div class="section">
                <h2>Register New User</h2>
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" placeholder="Enter name (e.g., John Smith)">
                </div>
                <div class="form-group">
                    <label for="userId">User ID:</label>
                    <input type="text" id="userId" placeholder="Enter ID (e.g., 1001)">
                </div>
                <button id="registerBtn">Capture & Register</button>
                <div id="registerMessage" class="message"></div>
            </div>

            <!-- Recognition Section -->
            <div class="section">
                <h2>Recognize Face</h2>
                <button id="recognizeBtn">Scan Face</button>
                <div id="recognizeResult" class="result">
                    <p style="text-align: center; color: #6c757d;">Click "Scan Face" to identify</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startCameraBtn = document.getElementById('startCamera');
        const registerBtn = document.getElementById('registerBtn');
        const recognizeBtn = document.getElementById('recognizeBtn');
        const nameInput = document.getElementById('name');
        const userIdInput = document.getElementById('userId');
        const registerMessage = document.getElementById('registerMessage');
        const recognizeResult = document.getElementById('recognizeResult');

        let stream = null;
        let cameraStarted = false;

        // Start camera
        startCameraBtn.addEventListener('click', async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });
                video.srcObject = stream;
                cameraStarted = true;
                startCameraBtn.textContent = 'Camera Active';
                startCameraBtn.disabled = true;
                registerBtn.disabled = false;
                recognizeBtn.disabled = false;
            } catch (err) {
                console.error('Error accessing camera:', err);
                alert('Error accessing camera. Please ensure you have granted camera permissions.');
            }
        });

        // Capture frame from video as blob
        function captureFrame() {
            return new Promise((resolve) => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                canvas.toBlob(resolve, 'image/jpeg', 0.95);
            });
        }

        // Show message
        function showMessage(element, text, isSuccess) {
            element.textContent = text;
            element.className = 'message';
            if (isSuccess) {
                element.classList.add('success');
            } else {
                element.classList.add('error');
            }
            element.style.display = 'block';

            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }

        // Register user
        registerBtn.addEventListener('click', async () => {
            if (!cameraStarted) {
                alert('Please start the camera first');
                return;
            }

            const name = nameInput.value.trim();
            const userId = userIdInput.value.trim();

            if (!name || !userId) {
                showMessage(registerMessage, 'Please enter both name and ID', false);
                return;
            }

            try {
                registerBtn.disabled = true;
                registerBtn.textContent = 'Registering...';

                // Capture frame
                const blob = await captureFrame();

                // Create form data
                const formData = new FormData();
                formData.append('file', blob, 'capture.jpg');
                formData.append('name', name);
                formData.append('user_id', userId);

                // Send to backend
                const response = await fetch('/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage(registerMessage, `Successfully registered ${result.name} (ID: ${result.id})`, true);
                    nameInput.value = '';
                    userIdInput.value = '';
                } else {
                    showMessage(registerMessage, result.detail || 'Registration failed', false);
                }
            } catch (err) {
                console.error('Registration error:', err);
                showMessage(registerMessage, 'Error during registration', false);
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = 'Capture & Register';
            }
        });

        // Recognize face
        recognizeBtn.addEventListener('click', async () => {
            if (!cameraStarted) {
                alert('Please start the camera first');
                return;
            }

            try {
                recognizeBtn.disabled = true;
                recognizeBtn.textContent = 'Scanning...';

                // Capture frame
                const blob = await captureFrame();

                // Create form data
                const formData = new FormData();
                formData.append('file', blob, 'recognize.jpg');

                // Send to backend
                const response = await fetch('/recognize', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                // Display result
                if (result.status === 'recognized') {
                    recognizeResult.className = 'result recognized';
                    recognizeResult.innerHTML = `
                        <div class="result-name">${result.name}</div>
                        <div class="result-id">ID: ${result.id}</div>
                        <div class="result-distance">Confidence: ${((1 - result.distance) * 100).toFixed(1)}%</div>
                    `;
                } else {
                    recognizeResult.className = 'result unknown';
                    recognizeResult.innerHTML = `
                        <div class="result-unknown">Unknown Person</div>
                        ${result.message ? `<p style="text-align: center; color: #6c757d; margin-top: 10px; font-size: 0.9em;">${result.message}</p>` : ''}
                    `;
                }
            } catch (err) {
                console.error('Recognition error:', err);
                recognizeResult.className = 'result error';
                recognizeResult.innerHTML = `
                    <div class="result-unknown">Error During Recognition</div>
                `;
            } finally {
                recognizeBtn.disabled = false;
                recognizeBtn.textContent = 'Scan Face';
            }
        });

        // Initially disable action buttons
        registerBtn.disabled = true;
        recognizeBtn.disabled = true;
    </script>
</body>
</html>
