<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Recognition Access System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .video-container {
            position: relative;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            font-size: 1em;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        button.primary {
            background: #667eea;
            color: white;
        }

        button.primary:hover {
            background: #5568d3;
        }

        button.danger {
            background: #f56565;
            color: white;
        }

        button.danger:hover {
            background: #e53e3e;
        }

        button.success {
            background: #48bb78;
            color: white;
        }

        button.success:hover {
            background: #38a169;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f7fafc;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .checkbox-container input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        .checkbox-container label {
            font-weight: 500;
            cursor: pointer;
            user-select: none;
        }

        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-weight: 500;
        }

        .status.success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .status.error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .status.info {
            background: #bee3f8;
            color: #2c5282;
            border: 1px solid #90cdf4;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #4a5568;
        }

        .form-group input[type="text"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .user-card {
            background: #f7fafc;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .user-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .user-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .user-card .user-name {
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 5px;
        }

        .user-card .user-date {
            font-size: 0.85em;
            color: #718096;
            margin-bottom: 10px;
        }

        .user-card button {
            width: 100%;
            padding: 8px;
            font-size: 0.9em;
        }

        .user-count {
            font-size: 0.9em;
            color: #718096;
            margin-top: 10px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Face Recognition Access System</h1>
            <p class="subtitle">Powered by DeepFace & Facenet512</p>
        </header>

        <div class="main-grid">
            <!-- Live Recognition Section -->
            <div class="card">
                <h2>Live Recognition</h2>

                <div class="video-container">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                </div>

                <div class="controls">
                    <button id="startCamera" class="success">Start Camera</button>
                    <button id="stopCamera" class="danger" disabled>Stop Camera</button>
                </div>

                <div class="checkbox-container">
                    <input type="checkbox" id="autoRecognize">
                    <label for="autoRecognize">Auto-recognize (every 2 seconds)</label>
                </div>

                <div id="recognitionStatus" class="status info hidden">
                    Ready to recognize faces
                </div>
            </div>

            <!-- Registration Section -->
            <div class="card">
                <h2>Register New Face</h2>

                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" placeholder="Enter name...">
                </div>

                <div class="controls">
                    <button id="captureRegister" class="primary">Capture & Register</button>
                </div>

                <div class="form-group">
                    <label for="fileUpload">Or upload image</label>
                    <input type="file" id="fileUpload" accept="image/*">
                </div>

                <div class="controls">
                    <button id="fileRegister" class="primary">Register from File</button>
                </div>

                <div id="registrationStatus" class="status info hidden">
                    Enter a name and capture or upload a photo
                </div>
            </div>
        </div>

        <!-- User Management Section -->
        <div class="card">
            <h2>Registered Users</h2>

            <div class="controls">
                <button id="refreshList" class="primary">Refresh List</button>
            </div>

            <div id="userGrid" class="user-grid">
                <!-- User cards will be inserted here -->
            </div>

            <div class="user-count">
                <span id="userCount">0 users registered</span>
            </div>
        </div>
    </div>

    <script>
        // API Base URL
        const API_BASE = window.location.origin;

        // DOM Elements
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startCameraBtn = document.getElementById('startCamera');
        const stopCameraBtn = document.getElementById('stopCamera');
        const autoRecognizeCheckbox = document.getElementById('autoRecognize');
        const recognitionStatus = document.getElementById('recognitionStatus');
        const userNameInput = document.getElementById('userName');
        const captureRegisterBtn = document.getElementById('captureRegister');
        const fileUploadInput = document.getElementById('fileUpload');
        const fileRegisterBtn = document.getElementById('fileRegister');
        const registrationStatus = document.getElementById('registrationStatus');
        const refreshListBtn = document.getElementById('refreshList');
        const userGrid = document.getElementById('userGrid');
        const userCount = document.getElementById('userCount');

        // State
        let stream = null;
        let recognitionInterval = null;

        // API Client
        const API = {
            async recognize(imageBlob) {
                const formData = new FormData();
                formData.append('image', imageBlob, 'capture.jpg');

                const response = await fetch(`${API_BASE}/api/recognize`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.details || error.error || 'Recognition failed');
                }

                return response.json();
            },

            async register(imageBlob, name) {
                const formData = new FormData();
                formData.append('image', imageBlob, 'register.jpg');
                formData.append('user_name', name);

                const response = await fetch(`${API_BASE}/api/register`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.details || error.error || 'Registration failed');
                }

                return response.json();
            },

            async listFaces() {
                const response = await fetch(`${API_BASE}/api/faces`);

                if (!response.ok) {
                    throw new Error('Failed to fetch user list');
                }

                return response.json();
            },

            async deleteFace(userId) {
                const response = await fetch(`${API_BASE}/api/faces/${userId}`, {
                    method: 'DELETE'
                });

                if (!response.ok) {
                    throw new Error('Failed to delete user');
                }

                return response.json();
            }
        };

        // Camera Management
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' }
                });
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                };

                startCameraBtn.disabled = true;
                stopCameraBtn.disabled = false;
                autoRecognizeCheckbox.disabled = false;

                showStatus(recognitionStatus, 'Camera started', 'success');
            } catch (error) {
                showStatus(recognitionStatus, `Camera error: ${error.message}`, 'error');
            }
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                video.srcObject = null;
                stream = null;
            }

            if (recognitionInterval) {
                clearInterval(recognitionInterval);
                recognitionInterval = null;
            }

            autoRecognizeCheckbox.checked = false;
            autoRecognizeCheckbox.disabled = true;
            startCameraBtn.disabled = false;
            stopCameraBtn.disabled = true;

            clearCanvas();
            showStatus(recognitionStatus, 'Camera stopped', 'info');
        }

        function startAutoRecognition() {
            if (recognitionInterval) {
                clearInterval(recognitionInterval);
            }

            recognitionInterval = setInterval(() => {
                recognizeFace();
            }, 2000);

            showStatus(recognitionStatus, 'Auto-recognition enabled', 'success');
        }

        function stopAutoRecognition() {
            if (recognitionInterval) {
                clearInterval(recognitionInterval);
                recognitionInterval = null;
            }

            clearCanvas();
            showStatus(recognitionStatus, 'Auto-recognition disabled', 'info');
        }

        // Recognition Flow
        async function recognizeFace() {
            if (!stream) return;

            try {
                const blob = await captureFrame();
                const result = await API.recognize(blob);

                if (result.user_name) {
                    drawOverlay(result.user_name, true);
                    showStatus(recognitionStatus, `Recognized: ${result.user_name} (${(result.confidence * 100).toFixed(1)}%)`, 'success');
                } else {
                    drawOverlay('Unknown', false);
                    showStatus(recognitionStatus, result.message, 'error');
                }
            } catch (error) {
                showStatus(recognitionStatus, `Recognition error: ${error.message}`, 'error');
                clearCanvas();
            }
        }

        function captureFrame() {
            return new Promise((resolve) => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);

                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.95);
            });
        }

        function drawOverlay(name, recognized) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const color = recognized ? '#48bb78' : '#f56565';
            const padding = 20;
            const rectWidth = canvas.width - (padding * 2);
            const rectHeight = canvas.height - (padding * 2);

            // Draw bounding box
            ctx.strokeStyle = color;
            ctx.lineWidth = 4;
            ctx.strokeRect(padding, padding, rectWidth, rectHeight);

            // Draw name label
            ctx.fillStyle = color;
            ctx.font = 'bold 32px Arial';
            const textMetrics = ctx.measureText(name);
            const textWidth = textMetrics.width;
            const textHeight = 40;
            const textX = (canvas.width - textWidth) / 2;
            const textY = padding - 10;

            ctx.fillRect(textX - 10, textY - textHeight, textWidth + 20, textHeight + 10);
            ctx.fillStyle = 'white';
            ctx.fillText(name, textX, textY - 10);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Registration Flow
        async function registerFromCapture() {
            const name = userNameInput.value.trim();

            if (!name) {
                showStatus(registrationStatus, 'Please enter a name', 'error');
                return;
            }

            if (!stream) {
                showStatus(registrationStatus, 'Please start the camera first', 'error');
                return;
            }

            try {
                showStatus(registrationStatus, 'Capturing and registering...', 'info');

                const blob = await captureFrame();
                const result = await API.register(blob, name);

                showStatus(registrationStatus, result.message, 'success');
                userNameInput.value = '';

                // Refresh user list
                await loadUserList();
            } catch (error) {
                showStatus(registrationStatus, `Registration error: ${error.message}`, 'error');
            }
        }

        async function registerFromFile() {
            const name = userNameInput.value.trim();

            if (!name) {
                showStatus(registrationStatus, 'Please enter a name', 'error');
                return;
            }

            const file = fileUploadInput.files[0];
            if (!file) {
                showStatus(registrationStatus, 'Please select an image file', 'error');
                return;
            }

            try {
                showStatus(registrationStatus, 'Registering from file...', 'info');

                const result = await API.register(file, name);

                showStatus(registrationStatus, result.message, 'success');
                userNameInput.value = '';
                fileUploadInput.value = '';

                // Refresh user list
                await loadUserList();
            } catch (error) {
                showStatus(registrationStatus, `Registration error: ${error.message}`, 'error');
            }
        }

        // User Management
        async function loadUserList() {
            try {
                const result = await API.listFaces();

                userGrid.innerHTML = '';

                if (result.faces.length === 0) {
                    userGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #718096;">No users registered yet</p>';
                } else {
                    result.faces.forEach(face => {
                        const userCard = createUserCard(face);
                        userGrid.appendChild(userCard);
                    });
                }

                userCount.textContent = `${result.count} user${result.count !== 1 ? 's' : ''} registered`;
            } catch (error) {
                userGrid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: #f56565;">Error loading users: ${error.message}</p>`;
            }
        }

        function createUserCard(face) {
            const card = document.createElement('div');
            card.className = 'user-card';

            card.innerHTML = `
                <img src="${face.thumbnail_url}" alt="${face.user_name}">
                <div class="user-name">${face.user_name}</div>
                <div class="user-date">${face.registered_at}</div>
                <button class="danger" onclick="deleteUser('${face.user_id}', '${face.user_name}')">Delete</button>
            `;

            return card;
        }

        async function deleteUser(userId, userName) {
            if (!confirm(`Are you sure you want to delete ${userName}?`)) {
                return;
            }

            try {
                await API.deleteFace(userId);
                await loadUserList();
            } catch (error) {
                alert(`Failed to delete user: ${error.message}`);
            }
        }

        // Utility
        function showStatus(element, message, type) {
            element.textContent = message;
            element.className = `status ${type}`;
            element.classList.remove('hidden');
        }

        // Event Listeners
        startCameraBtn.addEventListener('click', startCamera);
        stopCameraBtn.addEventListener('click', stopCamera);
        autoRecognizeCheckbox.addEventListener('change', (e) => {
            if (e.target.checked) {
                startAutoRecognition();
            } else {
                stopAutoRecognition();
            }
        });
        captureRegisterBtn.addEventListener('click', registerFromCapture);
        fileRegisterBtn.addEventListener('click', registerFromFile);
        refreshListBtn.addEventListener('click', loadUserList);

        // Initialize
        loadUserList();
    </script>
</body>
</html>
